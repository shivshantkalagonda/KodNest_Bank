<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | KodNest Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="align-items: flex-start; padding-top: 5vh;">
    <div class="container dashboard-container">
        
        <div class="dashboard-header">
            <div>
                <h2 id="welcomeText">Dashboard</h2>
                <p>Manage your funds securely.</p>
            </div>
            <button class="btn btn-secondary" style="width: auto;" onclick="handleLogout()">Logout</button>
        </div>

        <div id="dashboardMessage" class="message"></div>

        <div class="balance-card">
            <h3>Total Valid Balance</h3>
            <div class="balance-amount" id="balanceDisplay">
                <div class="loader"></div>
            </div>
            <!-- Check Balance refresh trigger (usually automatic but button added as requested) -->
            <button class="btn btn-secondary" style="margin-top: 2rem;" onclick="fetchBalance()" id="refreshBtn">
                Check Balance
            </button>
        </div>

        <div style="margin-top: 3rem;">
            <h3 style="margin-bottom: 1.5rem; font-weight: 500;">Transfer Money</h3>
            <form onsubmit="handleTransfer(event)" style="background: rgba(0,0,0,0.1); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border);">
                <div class="form-group">
                    <label for="recipientUsername">Recipient Username</label>
                    <input type="text" id="recipientUsername" placeholder="e.g. mike99" required>
                </div>
                <div class="form-group">
                    <label for="transferAmount">Amount ($)</label>
                    <input type="number" id="transferAmount" placeholder="0.00" min="0.01" step="0.01" required>
                </div>
                <button type="submit" class="btn" id="transferBtn">Send Securely</button>
            </form>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
