<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodNest Bank | Premium Banking</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Message Container -->
        <div id="authMessage" class="message"></div>

        <!-- Form Context Header -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>Welcome Back</h2>
            <p>Enter your details to access your account.</p>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
            <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="tab-content active">
            <form onsubmit="handleAuth(event, 'login')">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="e.g. john_doe" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="loginBtn">Sign In</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="tab-content">
            <form onsubmit="handleAuth(event, 'register')">
                <div class="form-group">
                    <label for="regUsername">Choose Username</label>
                    <input type="text" id="regUsername" placeholder="e.g. jane_doe" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="regPassword">Secure Password</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn" id="regBtn">Create Account</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
